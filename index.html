<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#070A12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="description" content="FlowShift by Vizio — gestão inteligente de escalas, jornadas e ponto." />
<title>FlowShift · by Vizio</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<style>
/* ===== FlowShift · Aura Orbi (Vizio) — estilos do app ===== */
:root{
  --font:'Century Gothic','Futura','Trebuchet MS',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --vizio:#1C64F0; --vizio-2:#4F8BFF; --r-sm:12px; --r:18px; --r-lg:24px;
  --mx:0; --my:0; --cx:50vw; --cy:40vh;
}
[data-theme="dark"]{
  --bg:#070A12; --glass:rgba(20,30,54,.55); --glass-2:rgba(26,38,66,.5); --glass-brd:rgba(140,175,255,.14); --glass-hi:rgba(255,255,255,.06);
  --card-brd:rgba(120,160,240,.12); --line:rgba(130,165,240,.12);
  --text:#EAF1FE; --muted:#93A6C9; --faint:#5E729A;
  --primary:var(--vizio); --primary-2:var(--vizio-2); --primary-ink:#fff;
  --good:#34D399; --warn:#FBBF24; --bad:#FB7185; --info:#60A5FA; --violet:#A78BFA; --cyan:#22D3EE;
  --chip:rgba(30,45,80,.6); --shadow:0 26px 60px -28px rgba(0,0,0,.85);
  --glow:0 0 0 1px rgba(79,139,255,.4),0 10px 34px -8px rgba(28,100,240,.5);
  --orb1:rgba(28,100,240,.55); --orb2:rgba(79,139,255,.42); --orb3:rgba(124,92,240,.34); --orb4:rgba(34,211,238,.3); --cursor:rgba(79,139,255,.16);
}
[data-theme="light"]{
  --bg:#EEF3FB; --glass:rgba(255,255,255,.72); --glass-2:rgba(255,255,255,.6); --glass-brd:rgba(28,100,240,.14); --glass-hi:rgba(255,255,255,.9);
  --card-brd:rgba(28,100,240,.12); --line:rgba(20,50,110,.1);
  --text:#0E1A30; --muted:#51648A; --faint:#8095B5;
  --primary:var(--vizio); --primary-2:#2E74F5; --primary-ink:#fff;
  --good:#059B72; --warn:#B7791F; --bad:#E11D48; --info:#2563EB; --violet:#7C3AED; --cyan:#0891B2;
  --chip:rgba(28,100,240,.07); --shadow:0 24px 50px -30px rgba(20,50,110,.4);
  --glow:0 0 0 1px rgba(28,100,240,.25),0 12px 30px -12px rgba(28,100,240,.35);
  --orb1:rgba(28,100,240,.3); --orb2:rgba(79,139,255,.26); --orb3:rgba(124,92,240,.18); --orb4:rgba(34,211,238,.2); --cursor:rgba(28,100,240,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased;position:relative}
.boot{position:fixed;inset:0;display:grid;place-items:center;color:var(--faint);font-family:var(--font);z-index:2}
body::after{content:"";position:fixed;left:var(--cx);top:var(--cy);width:520px;height:520px;margin:-260px;border-radius:50%;background:radial-gradient(circle,var(--cursor),transparent 62%);pointer-events:none;z-index:0}
.orbi{position:fixed;inset:-10%;z-index:0;overflow:hidden;pointer-events:none}
.orbi span{position:absolute;border-radius:50%;filter:blur(70px);will-change:transform}
.orbi .o1{width:46vw;height:46vw;background:var(--orb1);top:-14vw;right:-6vw;animation:f1 18s ease-in-out infinite;transform:translate(calc(var(--mx)*-38px),calc(var(--my)*-30px))}
.orbi .o2{width:52vw;height:52vw;background:var(--orb2);bottom:-24vw;left:-12vw;animation:f2 22s ease-in-out infinite;transform:translate(calc(var(--mx)*46px),calc(var(--my)*34px))}
.orbi .o3{width:34vw;height:34vw;background:var(--orb3);top:34%;left:48%;animation:f1 26s ease-in-out infinite reverse;transform:translate(calc(var(--mx)*28px),calc(var(--my)*-24px))}
.orbi .o4{width:24vw;height:24vw;background:var(--orb4);top:8%;left:26%;animation:f2 20s ease-in-out infinite reverse;transform:translate(calc(var(--mx)*-24px),calc(var(--my)*26px))}
@keyframes f1{0%,100%{margin:0}50%{margin:-40px 30px}}@keyframes f2{0%,100%{margin:0}50%{margin:34px -36px}}
.grain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;mix-blend-mode:overlay;background-image:radial-gradient(rgba(255,255,255,.25) .5px,transparent .5px);background-size:3px 3px}
.glass{background:var(--glass);backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px) saturate(150%);border:1px solid var(--glass-brd);box-shadow:var(--shadow),inset 0 1px 0 var(--glass-hi)}

/* ===== LOGIN ===== */
.login{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center;padding:24px}
.login .card{width:100%;max-width:410px;border-radius:var(--r-lg);padding:34px 30px}
.logo-badge{width:96px;height:96px;border-radius:26px;margin:0 auto 6px;display:grid;place-items:center;background:radial-gradient(120% 120% at 30% 20%,#12203c,#0a1020 70%);box-shadow:0 12px 34px -8px rgba(28,100,240,.6),inset 0 1px 0 rgba(255,255,255,.08)}
.logo-badge img{width:62px;height:62px;object-fit:contain;filter:drop-shadow(0 3px 12px rgba(79,139,255,.7))}
@media (prefers-reduced-motion:no-preference){.breathe{animation:br 4.5s ease-in-out infinite}}
@keyframes br{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.9}}
.login h1{text-align:center;font-size:26px;font-weight:800;margin-top:14px}
.login h1 .by{color:var(--primary-2)}
.login .sub{text-align:center;color:var(--muted);font-size:12.5px;margin:4px 0 22px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:0 2px 5px}
.inp{display:flex;align-items:center;gap:8px;background:var(--chip);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px}
.inp input{flex:1;background:transparent;border:0;outline:none;color:var(--text);font-family:var(--font);font-size:14px}
.inp .eye{cursor:pointer;color:var(--faint);font-size:12px;font-weight:700;user-select:none}
.inp .eye:hover{color:var(--primary-2)}
.btn{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:0;border-radius:var(--r-sm);padding:13px;font-family:var(--font);font-weight:800;font-size:14px;cursor:pointer;box-shadow:var(--glow);transition:.18s}
.btn:hover{transform:translateY(-1px);filter:brightness(1.06)}
.btn.sm{width:auto;padding:10px 16px;font-size:13px}
.btn.ghost{background:var(--glass);color:var(--text);border:1px solid var(--glass-brd);box-shadow:none}
.installbtn{width:100%;margin-top:10px;background:transparent;border:1px dashed var(--glass-brd);color:var(--primary-2);border-radius:var(--r-sm);padding:11px;font-family:var(--font);font-weight:700;font-size:12.5px;cursor:pointer}
.login .err{color:var(--bad);font-size:12px;text-align:center;margin-top:10px;min-height:16px}
.login .demo{text-align:center;color:var(--faint);font-size:11px;margin-top:14px}

/* ===== APP SHELL ===== */
.app{position:relative;z-index:1;display:grid;grid-template-columns:250px 1fr;height:100vh}
.side{margin:12px 0 12px 12px;border-radius:var(--r-lg);display:flex;flex-direction:column;padding:16px 12px;gap:5px;overflow:hidden}
.brand{display:flex;align-items:center;gap:11px;padding:6px 6px 14px}
.brand img{width:40px;height:40px;object-fit:contain;filter:drop-shadow(0 4px 14px rgba(28,100,240,.55));animation:bob 6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-4px) rotate(-3deg)}}
.brand b{font-size:17px;font-weight:800;display:block;line-height:1}
.brand small{color:var(--faint);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.brand small b{color:var(--primary-2);display:inline;font-size:10px}
.unit{background:var(--chip);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;margin:0 2px 8px}
.unit select{background:transparent;border:0;color:var(--text);font-family:var(--font);font-size:12.5px;font-weight:700;width:100%;cursor:pointer;outline:none}
.nav-lbl{color:var(--faint);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 12px 4px;font-weight:700}
.nav{display:flex;flex-direction:column;gap:3px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);color:var(--muted);text-decoration:none;font-weight:600;font-size:13.5px;cursor:pointer;border:1px solid transparent;transition:.18s}
.nav a svg{width:18px;height:18px;flex:none;stroke:currentColor;fill:none;stroke-width:1.9}
.nav a:hover{background:var(--glass-2);color:var(--text);transform:translateX(2px)}
.nav a.active{background:linear-gradient(90deg,color-mix(in srgb,var(--primary) 26%,transparent),transparent);color:#fff;border-color:color-mix(in srgb,var(--primary-2) 40%,transparent)}
[data-theme="light"] .nav a.active{color:var(--primary)}
.nav a .plan{margin-left:auto;font-size:9px;font-weight:800;color:var(--violet);background:color-mix(in srgb,var(--violet) 18%,transparent);padding:2px 6px;border-radius:20px}
.side-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--vizio),var(--violet));display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;box-shadow:var(--glow)}
.side-foot .who b{font-size:12.5px} .side-foot .who span{font-size:10.5px;color:var(--faint)}
.fs-usermenu{position:relative;width:100%}
.fs-uchip{display:flex;align-items:center;gap:10px;width:100%;background:var(--chip);border:1px solid var(--line);border-radius:var(--r-sm);padding:6px 10px;cursor:pointer;color:var(--text);transition:.15s}
.fs-uchip:hover{background:rgba(130,165,240,.1)}
.fs-uchip .who{display:flex;flex-direction:column;line-height:1.15;text-align:left;min-width:0;flex:1}
.fs-uchip .who b{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fs-uchip .who span{font-size:10.5px;color:var(--faint)}
.fs-uchip .cx{font-size:9px;color:var(--muted)}
.fs-uback{position:fixed;inset:0;z-index:40}
.fs-upop{position:absolute;left:0;bottom:calc(100% + 8px);z-index:41;width:230px;border-radius:14px;padding:8px;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.fs-umi{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:var(--text);font-size:13px;text-align:left;padding:10px;border-radius:10px;cursor:pointer;transition:.14s}
.fs-umi svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;flex:none}
.fs-umi:hover{background:rgba(130,165,240,.1)}
.fs-umi.danger{color:#ff8f8f} .fs-umi.danger:hover{background:rgba(255,90,90,.12)}
.fs-modal-bg{position:fixed;inset:0;z-index:60;background:rgba(2,6,14,.6);backdrop-filter:blur(4px);display:grid;place-items:center;padding:20px}
.fs-modal{width:100%;max-width:420px;border-radius:18px;padding:22px}
.fs-inp{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--chip);color:var(--text);font-size:14px;box-sizing:border-box}
.tgl{margin-left:auto;background:var(--chip);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:11px;cursor:pointer;display:grid;place-items:center}
.tgl:hover{color:var(--primary-2)} .tgl svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}
.main{overflow-y:auto;padding:18px 22px 40px}
.top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.top h1{font-size:22px;font-weight:800}.top .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
.search{margin-left:auto;border-radius:var(--r-sm);padding:9px 13px;display:flex;align-items:center;gap:8px;color:var(--faint);min-width:200px}
.search svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.search input{background:transparent;border:0;outline:none;color:var(--text);font-family:var(--font);font-size:13px;width:100%}
.tbtn{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:0;border-radius:var(--r-sm);padding:10px 16px;font-family:var(--font);font-weight:800;font-size:13px;cursor:pointer;box-shadow:var(--glow);display:inline-flex;align-items:center;gap:7px}
.tbtn.ghost{background:var(--glass);color:var(--text);border:1px solid var(--glass-brd);box-shadow:none}
.tbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:16px}
.kpi{border-radius:var(--r);padding:15px 16px;position:relative;overflow:hidden;transition:.2s}
.kpi:hover{transform:translateY(-3px)}
.kpi .kt{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11.5px;font-weight:700}
.kpi .dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 10px currentColor}
.kpi .val{font-size:27px;font-weight:800;margin-top:8px}.kpi .val small{font-size:14px;color:var(--faint);font-weight:700}
.kpi .delta{font-size:11.5px;font-weight:700;margin-top:3px}
.up{color:var(--good)}.down{color:var(--bad)}.flat{color:var(--faint)}
.kpi .bar{height:5px;border-radius:4px;background:var(--chip);margin-top:11px;overflow:hidden}
.kpi .bar i{display:block;height:100%;border-radius:4px;box-shadow:0 0 8px currentColor}
.grid{display:grid;grid-template-columns:1.35fr 1fr;gap:13px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-top:13px}
.panel{border-radius:var(--r);padding:16px 17px}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.ph h3{font-size:14.5px;font-weight:800}
.tag{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.tag.live{color:var(--good);background:color-mix(in srgb,var(--good) 15%,transparent)}
.tag.ai{color:var(--violet);background:color-mix(in srgb,var(--violet) 16%,transparent)}
.tag.rules{color:var(--warn);background:color-mix(in srgb,var(--warn) 16%,transparent)}
.more{margin-left:auto;color:var(--faint);font-size:12px;cursor:pointer}.more:hover{color:var(--primary-2)}
.person{display:flex;align-items:center;gap:11px;padding:9px 6px;border-radius:10px}
.person:hover{background:var(--glass-2)}.person+.person{border-top:1px solid var(--line)}
.pa{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:11px;color:#fff;flex:none}
.person .nm{font-weight:700;font-size:13px}.person .rl{color:var(--faint);font-size:11px}
.st{margin-left:auto;font-size:11px;font-weight:800;padding:4px 9px;border-radius:20px;display:flex;align-items:center;gap:6px}
.st .d{width:7px;height:7px;border-radius:50%}
.s-work{color:var(--good);background:color-mix(in srgb,var(--good) 14%,transparent)}
.s-late{color:var(--warn);background:color-mix(in srgb,var(--warn) 14%,transparent)}
.s-miss{color:var(--bad);background:color-mix(in srgb,var(--bad) 14%,transparent)}
.s-rest{color:var(--info);background:color-mix(in srgb,var(--info) 14%,transparent)}
.s-off{color:var(--faint);background:var(--chip)}
.pend{display:flex;align-items:flex-start;gap:11px;padding:11px 6px}.pend+.pend{border-top:1px solid var(--line)}
.pi{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
.pi svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2}
.pend .tx{flex:1}.pend .tx b{font-size:13px}.pend .tx p{color:var(--muted);font-size:11.5px;margin-top:2px}
.acts{display:flex;gap:6px;margin-top:8px}
.mini{font-size:11px;font-weight:800;padding:5px 11px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--glass);color:var(--text)}
.mini.ok{background:color-mix(in srgb,var(--good) 16%,transparent);border-color:transparent;color:var(--good)}
.mini.no{background:color-mix(in srgb,var(--bad) 12%,transparent);border-color:transparent;color:var(--bad)}
.alert{display:flex;gap:10px;padding:10px 6px;align-items:flex-start}.alert+.alert{border-top:1px solid var(--line)}
.alert .ab{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none;box-shadow:0 0 8px currentColor}
.alert b{font-size:12.5px}.alert p{color:var(--muted);font-size:11.5px;margin-top:1px}
.shift{display:flex;align-items:center;gap:10px;padding:9px 6px}.shift+.shift{border-top:1px solid var(--line)}
.shift .tm{font-weight:800;font-size:12px;color:var(--primary-2);width:92px;flex:none}
.shift .w2{font-weight:700;font-size:12.5px}.shift .r2{color:var(--faint);font-size:11px}
.cov{margin-left:auto;font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:20px}
.cov.full{color:var(--good);background:color-mix(in srgb,var(--good) 14%,transparent)}
.cov.gap{color:var(--bad);background:color-mix(in srgb,var(--bad) 14%,transparent)}
.hb{display:flex;align-items:flex-end;gap:9px;height:118px;padding-top:6px}
.hb .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.hb .col .b{width:72%;border-radius:6px;min-height:4px;box-shadow:0 0 12px -2px currentColor}
.hb .col small{color:var(--faint);font-size:10.5px;font-weight:700}
.insight{background:linear-gradient(135deg,color-mix(in srgb,var(--violet) 14%,transparent),transparent);border:1px solid color-mix(in srgb,var(--violet) 24%,transparent);border-radius:12px;padding:12px 13px}
.insight b{font-size:12.5px}.insight p{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.5}
.insight .why{color:var(--violet);font-size:11px;font-weight:800;margin-top:6px;cursor:pointer}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line)}.tbl tr:hover td{background:var(--glass-2)}
.badge{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px}
.b-clt{color:var(--info);background:color-mix(in srgb,var(--info) 14%,transparent)}
.b-pj{color:var(--violet);background:color-mix(in srgb,var(--violet) 14%,transparent)}
.b-ok{color:var(--good);background:color-mix(in srgb,var(--good) 14%,transparent)}
.b-fe{color:var(--warn);background:color-mix(in srgb,var(--warn) 14%,transparent)}
.stub{display:grid;place-items:center;height:60vh;text-align:center}
.stub .ic{width:74px;height:74px;border-radius:22px;display:grid;place-items:center;margin:0 auto 16px}
.stub .ic svg{width:34px;height:34px;stroke:var(--primary-2);fill:none;stroke-width:1.7}
.stub h2{font-size:19px;margin-bottom:6px}.stub p{color:var(--muted);max-width:440px;margin:0 auto 16px;line-height:1.6}
.locknote{color:var(--violet);font-weight:800;font-size:12px;margin-bottom:14px}
.hint{color:var(--faint);font-size:11px;text-align:center;margin-top:20px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);padding:12px 20px;border-radius:14px;font-weight:700;font-size:13px;z-index:50;display:flex;gap:9px;align-items:center;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:17px;height:17px;stroke:var(--primary-2);fill:none;stroke-width:2.2}
/* rodapé de usuário (card com avatar + ações) */
.side-foot{flex-direction:column;align-items:stretch;gap:10px}
.uprow{display:flex;align-items:center;gap:10px}
.ubtns{display:flex;gap:6px}
.ubtn{flex:1;height:34px;border-radius:10px;background:var(--chip);border:1px solid var(--line);color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:.15s}
.ubtn:hover{color:var(--primary-2);border-color:color-mix(in srgb,var(--primary-2) 40%,transparent)}
.ubtn.danger:hover{color:var(--bad);border-color:color-mix(in srgb,var(--bad) 40%,transparent)}
.ubtn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}
/* botão voltar */

          var banco=Object.keys(byEmp).map(function(id){ var v=Math.round(byEmp[id]); return [nmeMap[id]||"—",(v>=0?"+":"")+v+"h", v>=0?"var(--good)":"var(--bad)"]; });
          var bancoTotal=Math.round(ledger.reduce(function(a,l){return a+Number(l.delta);},0));
          var ativos=emps.filter(function(e){return e.status==="ativo";}).length;
          var trabalhando=(function(){var ins={};ponto.forEach(function(p){if(p.kind==="in")ins[p.nsr]=1;});return Object.keys(ins).length;})();
          var kpis=[
            ["Funcionários ativos",String(ativos),"","var(--good)","flat","de "+emps.length+" no total",Math.round(ativos/Math.max(1,emps.length)*100)],
            ["Pontos hoje",String(ponto.length),"","var(--info)","flat","marcações REP-P",Math.min(100,ponto.length*20)],
            ["Banco de horas",(bancoTotal>=0?"+":"")+bancoTotal,"h",bancoTotal>=0?"var(--info)":"var(--bad)","flat","unidade",Math.min(100,Math.abs(bancoTotal))],
            ["Unidades",String(units.length),"","var(--violet)","flat","ativas",Math.min(100,units.length*20)],
            ["Escala","publicada","","var(--good)","flat","semana atual",100]
          ];
          setStore({ units:units, employees:emps, ponto:ponto, banco:banco, bancoTotal:bancoTotal, kpis:kpis });
        }).catch(function(){ setStore(null); });
      }
    },[user]);
    useEffect(function(){
      var rx=0,ry=0,tx=0,ty=0,raf;
      function mm(e){tx=(e.clientX/window.innerWidth-.5)*2;ty=(e.clientY/window.innerHeight-.5)*2;var r=document.documentElement.style;r.setProperty("--cx",e.clientX+"px");r.setProperty("--cy",e.clientY+"px");}
      function loop(){rx+=(tx-rx)*.06;ry+=(ty-ry)*.06;var r=document.documentElement.style;r.setProperty("--mx",rx.toFixed(3));r.setProperty("--my",ry.toFixed(3));raf=requestAnimationFrame(loop);}
      window.addEventListener("mousemove",mm); loop();
      return function(){window.removeEventListener("mousemove",mm);cancelAnimationFrame(raf);};
    },[]);
    function logout(){ try{ if(sb) sb.auth.signOut(); }catch(e){} setStore(null); setUser(null); }
    if(!user) return h(Login,{onLogin:setUser});
    return h(Shell,{user:user,setUser:setUser,theme:theme,setTheme:setTheme,store:store,onLogout:logout});
  }

  var root=document.getElementById("root");
  root.className=""; root.textContent="";
  ReactDOM.createRoot(root).render(h(App));

  if("serviceWorker" in navigator){ window.addEventListener("load",function(){
    var _hadCtrl=!!navigator.serviceWorker.controller, _refreshing=false;
    navigator.serviceWorker.addEventListener("controllerchange",function(){ if(_refreshing)return; _refreshing=true; if(_hadCtrl) location.reload(); });
    navigator.serviceWorker.register("sw.js").then(function(reg){ try{ reg.update(); }catch(x){} }).catch(function(){});
  }); }
})();

</script>
