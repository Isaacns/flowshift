<html lang="pt-BR" data-theme="dark">

<title>FlowShift — Portal do Funcionário</title>
<style>
:root{--font:'Century Gothic','Futura','Trebuchet MS',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;--vizio:#1C64F0;--vizio-2:#4F8BFF;

 --shadow:0 26px 60px -28px rgba(0,0,0,.85);--glow:0 0 0 1px rgba(79,139,255,.4),0 10px 34px -8px rgba(28,100,240,.5);}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;display:grid;place-items:center;padding:16px}
.orbi{position:fixed;inset:-10%;z-index:0;overflow:hidden;pointer-events:none}
.orbi span{position:absolute;border-radius:50%;filter:blur(70px)}
.orbi .o1{width:52vw;height:52vw;background:rgba(28,100,240,.5);top:-16vw;right:-8vw}
.orbi .o2{width:58vw;height:58vw;background:rgba(79,139,255,.34);bottom:-26vw;left:-14vw}
.orbi .o3{width:36vw;height:36vw;background:rgba(124,92,240,.3);top:30%;left:44%}
.glass{background:var(--glass);backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px) saturate(150%);border:1px solid var(--glass-brd);box-shadow:var(--shadow),inset 0 1px 0 var(--glass-hi)}
.phone{position:relative;z-index:1;width:100%;max-width:420px;height:min(880px,95vh);border-radius:32px;overflow:hidden;display:flex;flex-direction:column}
.login{display:grid;place-items:center;flex:1;padding:26px}
.login .card{width:100%;max-width:360px;border-radius:22px;padding:30px 26px;text-align:center}
/* ===== AURA — marca viva (padrão INPERSON/VIZIO) ===== */
@keyframes fs-breathe-soft{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
@keyframes fs-glow{0%,100%{filter:drop-shadow(0 0 5px rgba(79,139,255,.45))}50%{filter:drop-shadow(0 0 20px rgba(79,139,255,.95))}}
@keyframes fs-aura-breathe{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:.95;transform:translate(-50%,-50%) scale(1.14)}}
.logo-hero{position:relative;display:grid;place-items:center;margin:0 auto 6px}
.logo-hero::before{content:"";position:absolute;left:50%;top:50%;width:210px;height:210px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(79,139,255,.22),rgba(28,100,240,.05) 55%,transparent 70%);filter:blur(12px);z-index:0;pointer-events:none}
.logo{position:relative;z-index:1;width:88px;height:88px;object-fit:contain;filter:drop-shadow(0 6px 20px rgba(79,139,255,.55));display:block;transform-origin:center}
@media (prefers-reduced-motion:no-preference){
  .logo-hero::before{animation:fs-aura-breathe 5s ease-in-out infinite}
  .logo{animation:fs-glow 4.2s ease-in-out infinite,fs-breathe-soft 5.5s ease-in-out infinite}
  .hdr img.cube{animation:fs-breathe-soft 6s ease-in-out infinite,fs-glow 5s ease-in-out infinite}
}
.login h1{font-size:22px;font-weight:800;margin-top:8px}.login h1 span{color:var(--primary-2)}
.login .sub{color:var(--muted);font-size:12px;margin:4px 0 20px}
.inp{width:100%;background:var(--chip);border:1px solid var(--line);border-radius:12px;padding:12px 13px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;margin-bottom:11px}
.btn{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:0;border-radius:12px;padding:13px;font-family:var(--font);font-weight:800;font-size:14px;cursor:pointer;box-shadow:var(--glow)}
.err{color:var(--bad);font-size:12px;margin-top:10px;min-height:15px}
.hdr{padding:15px 17px 12px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line)}
.hdr img.cube{width:32px;height:32px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(28,100,240,.5));transform-origin:center}
.hdr .t b{font-size:14.5px;display:block;line-height:1}.hdr .t small{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--faint)}
.hdr .t small b{color:var(--primary-2);display:inline;font-size:9px}
.hdr .me{margin-left:auto;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--vizio),var(--violet));display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px;box-shadow:var(--glow);cursor:pointer}
.scroll{flex:1;overflow-y:auto;padding:16px 15px 88px}.scroll::-webkit-scrollbar{width:0}
.hello{font-size:20px;font-weight:800;margin:2px 2px}.hello span{color:var(--primary-2)}
.subhello{color:var(--muted);font-size:12px;margin:0 2px 8px}
h2.sec{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin:16px 2px 8px;font-weight:800}
.card{border-radius:16px;padding:14px 15px;margin-bottom:11px}
.next{background:linear-gradient(135deg,color-mix(in srgb,var(--vizio) 40%,transparent),color-mix(in srgb,var(--violet) 26%,transparent));border:1px solid color-mix(in srgb,var(--vizio-2) 45%,transparent);color:#fff}
.next .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.85;font-weight:800}
.next .big{font-size:24px;font-weight:800;margin:5px 0 2px}.next .meta{font-size:12px;opacity:.92}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:2px}
.stat{border-radius:13px;padding:11px 8px;text-align:center}.stat .v{font-size:18px;font-weight:800}.stat .v small{font-size:10px;color:var(--faint)}.stat .k{font-size:9.5px;color:var(--muted);margin-top:2px;font-weight:700}
.row{display:flex;align-items:center;gap:11px;padding:10px 4px}.row+.row{border-top:1px solid var(--line)}
.row .db{width:42px;text-align:center;flex:none}.row .db b{font-size:16px;font-weight:800;display:block;line-height:1}.row .db small{font-size:9px;color:var(--faint);text-transform:uppercase}
.row .di b{font-size:12.5px}.row .di span{font-size:11px;color:var(--muted)}
.chip{margin-left:auto;font-size:10px;font-weight:800;padding:4px 9px;border-radius:20px}
.cM{color:var(--info);background:color-mix(in srgb,var(--info) 15%,transparent)}.cN{color:var(--violet);background:color-mix(in srgb,var(--violet) 15%,transparent)}
.cF{color:var(--good);background:color-mix(in srgb,var(--good) 15%,transparent)}.cP{color:var(--warn);background:color-mix(in srgb,var(--warn) 15%,transparent)}
.clock{text-align:center;font-size:42px;font-weight:800;margin:4px 0 0}.clock small{display:block;font-size:12px;color:var(--muted);font-weight:600}
.geo{text-align:center;color:var(--good);font-size:11px;font-weight:700;margin:5px 0 13px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.pb{padding:14px;border-radius:13px;border:1px solid var(--glass-brd);background:var(--glass-2);cursor:pointer;text-align:center;font-weight:800;font-size:13px}
.pb.done{border-color:transparent;background:color-mix(in srgb,var(--good) 15%,transparent);color:var(--good)}
.pb small{display:block;color:var(--faint);font-weight:600;font-size:10px;margin-top:3px}.pb.done small{color:var(--good)}
.pb[disabled]{opacity:.45;pointer-events:none}
.sw{display:flex;align-items:flex-start;gap:10px;padding:11px 3px}.sw+.sw{border-top:1px solid var(--line)}
.sw .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none;background:var(--info)}
.sw .ic svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2}
.sw .tx{flex:1}.sw .tx b{font-size:12.5px}.sw .tx p{font-size:11px;color:var(--muted);margin-top:1px}
.stt{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;margin-top:6px;display:inline-block}
.stt.wait{color:var(--warn);background:color-mix(in srgb,var(--warn) 15%,transparent)}
.stt.ok{color:var(--good);background:color-mix(in srgb,var(--good) 15%,transparent)}
.stt.no{color:var(--bad);background:color-mix(in srgb,var(--bad) 15%,transparent)}
.acts{display:flex;gap:7px;margin-top:8px}
.mini{font-size:11px;font-weight:800;padding:6px 13px;border-radius:9px;cursor:pointer;border:1px solid var(--line);background:var(--glass-2);color:var(--text)}
.mini.ok{background:color-mix(in srgb,var(--good) 16%,transparent);border-color:transparent;color:var(--good)}
.mini.no{background:color-mix(in srgb,var(--bad) 12%,transparent);border-color:transparent;color:var(--bad)}
.tabs{position:absolute;bottom:0;left:0;right:0;display:flex;padding:8px 8px 14px;gap:2px;border-top:1px solid var(--line)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--faint);cursor:pointer;font-size:9.5px;font-weight:700;border-radius:12px}
.tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.9}.tab.on{color:var(--primary-2)}.tab.on svg{filter:drop-shadow(0 0 8px var(--primary-2))}
.view{display:none}.view.on{display:block;animation:f .3s}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.empty{color:var(--faint);font-size:12px;text-align:center;padding:20px}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(16px);padding:11px 18px;border-radius:13px;font-weight:700;font-size:12px;z-index:60;opacity:0;transition:.3s;max-width:340px;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bell{position:relative;width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:var(--glass-2);border:1px solid var(--glass-brd);cursor:pointer}
.bell svg{width:17px;height:17px;stroke:var(--text);fill:none;stroke-width:2}
.bell .badge{position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:var(--bad);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center;box-shadow:0 2px 8px rgba(251,113,133,.6)}
.npanel{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;animation:f .25s}
.npanel .nhd{padding:15px 17px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
.npanel .nhd svg{width:18px;height:18px;stroke:var(--primary-2);fill:none;stroke-width:2}
.npanel .nhd b{font-size:15px;font-weight:800}.npanel .nhd .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;font-weight:700}
.npanel .nbody{flex:1;overflow-y:auto;padding:12px 14px}.npanel .nbody::-webkit-scrollbar{width:0}
.nitem{border-radius:13px;padding:12px 13px;margin-bottom:9px;border:1px solid var(--glass-brd);background:var(--glass-2)}
.nitem.un{border-color:color-mix(in srgb,var(--vizio-2) 45%,transparent);background:color-mix(in srgb,var(--vizio) 12%,transparent)}
.nitem b{font-size:12.5px;display:block}.nitem p{font-size:11.5px;color:var(--muted);margin-top:3px}.nitem time{font-size:10px;color:var(--faint);margin-top:5px;display:block}
</style>
</head>
